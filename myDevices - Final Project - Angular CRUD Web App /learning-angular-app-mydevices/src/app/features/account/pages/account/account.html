<section class="mx-auto max-w-3xl space-y-6">
  <header class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
    <h1 class="text-3xl font-bold text-slate-900">Account</h1>
    <p class="mt-2 text-slate-600">Simple login/account area for the final project.</p>
  </header>

  <section class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200" *ngIf="currentUser$ | async as currentUser; else noAccount">
    <p><strong>Email:</strong> {{ currentUser.email }}</p>
    <p><strong>Role:</strong> {{ currentUser.role }}</p>

    <div class="mt-4 flex gap-3">
      <a routerLink="/objects" class="rounded-md border border-slate-300 px-3 py-1.5 text-sm">Back to Objects</a>
      <button type="button" (click)="logout()" class="rounded-md bg-slate-900 px-3 py-1.5 text-sm font-semibold text-white">
        Logout
      </button>
    </div>
  </section>

  <ng-template #noAccount>
    <section class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
      <p class="text-slate-600">No active account session.</p>
      <a routerLink="/login" class="mt-3 inline-flex rounded-md bg-blue-700 px-3 py-1.5 text-sm font-semibold text-white">Go to Login</a>
    </section>
  </ng-template>
</section>
